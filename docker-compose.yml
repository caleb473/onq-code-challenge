services:
  postgres:
    image: postgres:17-alpine
    container_name: onq-challenge-postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: onq_challenge
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d onq_challenge"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: onq-challenge-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://dev:dev@postgres:5432/onq_challenge
      ENRICHMENT_API_URL: http://enrichment-api:4000
      ENRICHMENT_API_KEY: dev-secret-key
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/src
      - ./api/scripts:/app/scripts
      - ./api/drizzle:/app/drizzle
      - ./api/drizzle.config.js:/app/drizzle.config.js
    command: yarn start

  enrichment-api:
    build: ./enrichment-api
    container_name: onq-challenge-enrichment-api
    environment:
      PORT: 4000
      API_KEY: dev-secret-key
      NODE_ENV: development
    ports:
      - "4000:4000"
    volumes:
      - ./enrichment-api/src:/app/src
    command: yarn dev

  web:
    build: ./web
    container_name: onq-challenge-web
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
      - ./web/vite.config.js:/app/vite.config.js
    command: yarn dev --host 0.0.0.0

volumes:
  pg-data:
